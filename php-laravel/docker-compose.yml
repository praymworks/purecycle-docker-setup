version: "3.8"

services:
  nginx-project:
    container_name: nginx-project
    image: nginx:alpine
    restart: always
    depends_on:
      - php-project
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /home/ubuntu/purecycle/purecycle-backend-laravel:/usr/share/nginx/html
    ports:
      - "127.0.0.1:8081:80"
    environment:
      TZ: Asia/Manila

  php-project:
    container_name: php-project
    build: ./php
    restart: always
    expose:
      - "9000"
    volumes:
      - /home/ubuntu/purecycle/purecycle-backend-laravel:/usr/share/nginx/html
    working_dir: /usr/share/nginx/html
    environment:
      TZ: Asia/Manila